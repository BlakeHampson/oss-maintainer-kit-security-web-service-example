<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">security web service preview card</title>
  <desc id="desc">Summary card for the security-sensitive web service oss-maintainer-kit example repository.</desc>
  <rect width="1200" height="630" fill="#0A1220"/>
  <rect x="36" y="36" width="1128" height="558" rx="28" fill="#101C2F"/>
  <rect x="36" y="36" width="1128" height="8" fill="#B91C1C"/>
  <text x="72" y="108" fill="#93C5FD" font-family="SF Pro Display, Inter, system-ui, sans-serif" font-size="22" font-weight="600">oss-maintainer-kit example</text>
  <text x="72" y="170" fill="#EFF6FF" font-family="SF Pro Display, Inter, system-ui, sans-serif" font-size="48" font-weight="700">security-sensitive web service</text>
  <text x="72" y="214" fill="#BFDBFE" font-family="SF Pro Text, Inter, system-ui, sans-serif" font-size="24">A safer starting point for deployable services with auth and infra risk.</text>

  <rect x="72" y="266" width="320" height="178" rx="22" fill="#16243C" stroke="#26395A"/>
  <text x="100" y="316" fill="#FCA5A5" font-family="SF Pro Display, Inter, system-ui, sans-serif" font-size="22" font-weight="700">Best for</text>
  <text x="100" y="356" fill="#E0F2FE" font-family="SF Pro Text, Inter, system-ui, sans-serif" font-size="24">
    <tspan x="100" dy="0">auth-heavy APIs, internal tools,</tspan>
    <tspan x="100" dy="30">and deployable web services</tspan>
  </text>

  <rect x="440" y="266" width="320" height="178" rx="22" fill="#16243C" stroke="#26395A"/>
  <text x="468" y="316" fill="#FCA5A5" font-family="SF Pro Display, Inter, system-ui, sans-serif" font-size="22" font-weight="700">Inspect first</text>
  <text x="468" y="356" fill="#E0F2FE" font-family="SF Pro Text, Inter, system-ui, sans-serif" font-size="24">
    <tspan x="468" dy="0">AGENTS, threat model, deploy</tspan>
    <tspan x="468" dy="30">notes, and PR templates</tspan>
  </text>

  <rect x="808" y="266" width="320" height="178" rx="22" fill="#16243C" stroke="#26395A"/>
  <text x="836" y="316" fill="#FCA5A5" font-family="SF Pro Display, Inter, system-ui, sans-serif" font-size="22" font-weight="700">Outcome</text>
  <text x="836" y="356" fill="#E0F2FE" font-family="SF Pro Text, Inter, system-ui, sans-serif" font-size="24">
    <tspan x="836" dy="0">risk-aware maintainer docs</tspan>
    <tspan x="836" dy="30">before automation and deploys</tspan>
  </text>

  <rect x="72" y="490" width="1056" height="70" rx="16" fill="#0A1220" stroke="#26395A"/>
  <text x="100" y="534" fill="#FCA5A5" font-family="SF Mono, Menlo, monospace" font-size="22">npx oss-maintainer-kit init . --preset security-sensitive-repo</text>
</svg>
